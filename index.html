<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上協談預約系統</title>
  
  <!-- 引入 Tailwind CSS 進行快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用來在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    .animate-fade-in-right { animation: fadeInRight 0.4s ease-out forwards; }
    .animate-scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-spin-slow { animation: spin 2s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 使用 data-type="module" 讓 Babel 支援 ES Modules 引入 Firebase -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo } = React;

    // 👇 【設定區 1】 您的專屬 Firebase 設定 👇
    const firebaseConfig = {
      apiKey: "AIzaSyAM4zx1l28YErBfpnPGHCEh6IUmKbDJ0DY",
      authDomain: "counsel-cw.firebaseapp.com",
      projectId: "counsel-cw",
      storageBucket: "counsel-cw.firebasestorage.app",
      messagingSenderId: "820626619973",
      appId: "1:820626619973:web:5ba389b98819638113ad2c",
      measurementId: "G-WRTESNC67C"
    };

    // 👇 【設定區 2】 您的 Google Apps Script (GAS) 網址 👇
    const GAS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwud980ZnFReI9YkcX2sEpcn29eIKSGLUTOxd9-KBnXztlz3OjPgihY7ltMGqS8CvH2Xw/exec";
    
    // --- Firebase 初始化 ---
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const databaseNameId = "my-booking-app"; 

    // --- Icons ---
    const CalendarIcon = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const Clock = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const User = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const PhoneIcon = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
    const CheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const Mail = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>;
    const FileText = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>;
    const CalendarHeart = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h7"></path><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path><path d="M21.29 14.7a2.43 2.43 0 0 0-2.65-.52c-.3.12-.57.3-.8.53l-.34.34-.35-.34a2.43 2.43 0 0 0-2.65-.53c-.3.12-.56.3-.79.53-.95.94-1 2.53-.2 3.59L17.5 22l4-3.73c.8-1.06.75-2.65-.21-3.57z"></path></svg>;
    const SearchIcon = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const TrashIcon = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"></path></svg>;

    const safeScrollToTop = () => {
      try { window.scrollTo({ top: 0, behavior: 'smooth' }); } 
      catch (error) { console.warn('Scroll blocked', error); }
    };

    const StepIndicator = ({ currentStep }) => (
      <div className="flex justify-center mt-4">
        <div className="flex items-center space-x-2">
          <div className={`transition-all duration-300 rounded-full ${currentStep >= 1 ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-teal-400 opacity-50'}`}></div>
          <div className={`transition-all duration-300 rounded-full ${currentStep >= 2 ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-teal-400 opacity-50'}`}></div>
          <div className={`transition-all duration-300 rounded-full ${currentStep >= 3 ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-teal-400 opacity-50'}`}></div>
        </div>
      </div>
    );

    const InputField = ({ label, icon: Icon, required, note, type = "text", ...props }) => (
      <div className="mb-4">
        <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center">
          {Icon && <Icon size={16} className="mr-1 text-teal-600" />} 
          {label} {required && <span className="text-red-500 ml-1">*</span>}
          {note && <span className="text-gray-400 text-xs ml-2">{note}</span>}
        </label>
        {type === 'textarea' ? (
          <textarea {...props} className="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all resize-none bg-gray-50 focus:bg-white" />
        ) : (
          <input type={type} required={required} {...props} className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all bg-gray-50 focus:bg-white" />
        )}
      </div>
    );

    const StepOneTimeSelection = ({ schedule, availableDates, onTimeSelect, isLoadingSchedule, error }) => (
      <div className="space-y-6 animate-fade-in-up">
        <p className="text-gray-500 text-sm text-center mb-4 bg-teal-50 py-2 rounded-lg text-teal-700 font-medium">
          請選擇您方便的日期與時段 <br/><span className="text-xs opacity-80">(系統已即時過濾衝突時段與保留間隔)</span>
        </p>
        
        <div className="h-[420px] overflow-y-auto pr-2 space-y-4 custom-scrollbar">
          {isLoadingSchedule ? (
            <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-3">
              <Clock className="animate-spin-slow text-teal-500" size={32} />
              <p className="text-sm font-medium">同步最新空檔中...</p>
            </div>
          ) : error ? (
            <div className="flex flex-col items-center justify-center h-full text-red-500 space-y-3 p-6 text-center bg-red-50 rounded-xl border border-red-100">
              <p className="font-bold text-lg">資料連線失敗</p>
              <p className="text-sm text-red-600 text-left whitespace-pre-line leading-relaxed">{error}</p>
            </div>
          ) : availableDates.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-2"><p>近期已無可用時段，請稍後再試</p></div>
          ) : (
            availableDates.map(date => (
              <div key={date} className="bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                <div className="flex items-center text-teal-700 font-semibold mb-3 border-b border-gray-50 pb-2">
                  <CalendarIcon size={18} className="mr-2" /> {schedule[date]?.label || date}
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {schedule[date]?.slots?.map(time => (
                    <button type="button" key={time} onClick={() => onTimeSelect(date, time)} className="py-2.5 px-2 text-sm font-medium rounded-lg border border-teal-100 text-teal-700 bg-teal-50/50 hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-all focus:ring-4 focus:ring-teal-200 focus:outline-none active:scale-95">{time}</button>
                  ))}
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    );

    const StepTwoForm = ({ schedule, selectedDate, selectedTime, formData, onChange, onSubmit, isSubmitting, submitError, onBack }) => (
      <div className="animate-fade-in-right">
        <div className="bg-gradient-to-r from-teal-50 to-emerald-50 rounded-xl p-5 mb-6 flex items-center justify-between border border-teal-100 shadow-sm">
          <div>
            <p className="text-xs text-teal-600 font-bold mb-1 tracking-wider">已選時段</p>
            <p className="text-gray-800 font-bold text-lg">
              {schedule[selectedDate]?.label || ''} <span className="text-teal-700 ml-2">{selectedTime}</span>
            </p>
          </div>
          <div className="bg-white p-2 rounded-full shadow-sm">
            <Clock className="text-teal-500" size={24} />
          </div>
        </div>

        {submitError && (
          <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm border border-red-200 flex items-center">
            <span className="mr-2">⚠️</span> {submitError}
          </div>
        )}

        <form onSubmit={onSubmit} className="space-y-2">
          <InputField label="真實姓名" icon={User} required name="name" value={formData.name} onChange={onChange} placeholder="請輸入您的姓名" />
          <InputField label="手機號碼" icon={PhoneIcon} required type="tel" name="phone" value={formData.phone} onChange={onChange} placeholder="請輸入您的聯絡電話" />
          <InputField label="電子郵件" icon={Mail} required type="email" name="email" value={formData.email} onChange={onChange} placeholder="example@email.com" />
          <InputField label="協談備註" icon={FileText} type="textarea" note="(選填)" name="notes" rows="3" value={formData.notes} onChange={onChange} placeholder="簡單描述您想討論的議題，或需要特別協助的地方..." />

          {/* 新增的返回按鈕與送出按鈕群組 */}
          <div className="flex gap-3 mt-8">
            <button
              type="button"
              onClick={onBack}
              disabled={isSubmitting}
              className="w-1/3 py-3.5 rounded-xl font-bold text-teal-700 bg-teal-100 hover:bg-teal-200 transition-all flex justify-center items-center"
            >
              上一步
            </button>
            <button
              type="submit"
              disabled={isSubmitting}
              className={`w-2/3 py-3.5 rounded-xl font-bold text-white shadow-lg transition-all flex justify-center items-center ${
                isSubmitting 
                  ? 'bg-gray-400 cursor-not-allowed shadow-none' 
                  : 'bg-teal-600 hover:bg-teal-700 hover:shadow-teal-500/30 hover:-translate-y-0.5 active:translate-y-0'
              }`}
            >
              {isSubmitting ? (
                <span className="flex items-center"><Clock className="animate-spin mr-2" size={18} /> 處理中...</span>
              ) : '確認送出'}
            </button>
          </div>
        </form>
      </div>
    );

    const StepThreeSuccess = ({ formData, schedule, selectedDate, selectedTime, onReset }) => (
      <div className="text-center py-10 animate-scale-in">
        <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 relative">
          <div className="absolute inset-0 bg-green-400 rounded-full animate-ping opacity-20"></div>
          <CheckCircle className="text-green-500 relative z-10" size={48} />
        </div>
        
        <h2 className="text-2xl font-bold text-gray-800 mb-3">預約成功！</h2>
        <p className="text-gray-600 mb-6 font-medium">
          {schedule[selectedDate]?.label || ''} {selectedTime}
        </p>
        
        <div className="bg-teal-50 border-l-4 border-teal-400 p-4 text-left mb-8 rounded-r-xl shadow-sm">
          <p className="text-sm text-teal-800 font-medium">
            您的協談資料已經記錄，我們將盡快透過 Email ({formData.email}) 與您聯繫確認。
          </p>
        </div>
        
        <button type="button" onClick={onReset} className="text-teal-600 font-semibold hover:underline">返回首頁</button>
      </div>
    );

    // --- 查詢與取消預約元件 ---
    const QueryBookingView = ({ allBookings, db, databaseNameId }) => {
      const [queryEmail, setQueryEmail] = useState('');
      const [queryPhone, setQueryPhone] = useState('');
      const [queriedBookings, setQueriedBookings] = useState(null);
      const [isQuerying, setIsQuerying] = useState(false);
      const [cancelConfirmId, setCancelConfirmId] = useState(null);
      const [isCanceling, setIsCanceling] = useState(false);

      const handleQuery = (e) => {
        e.preventDefault();
        setIsQuerying(true);
        // 過濾出 Email 及手機皆符合，且尚未過期的預約
        const todayStr = new Date().toISOString().split('T')[0];
        const results = allBookings.filter(b => 
          b.email.toLowerCase() === queryEmail.toLowerCase() && 
          b.phone === queryPhone &&
          b.dateRaw >= todayStr
        );
        
        setTimeout(() => {
          setQueriedBookings(results);
          setIsQuerying(false);
        }, 600);
      };

      const handleCancel = async (bookingId) => {
        setIsCanceling(true);
        try {
          const bookingToCancel = queriedBookings.find(b => b.id === bookingId);
          const docRef = doc(db, 'artifacts', databaseNameId, 'public', 'data', 'bookings', bookingId);
          await deleteDoc(docRef);
          
          // 更新前端畫面
          setQueriedBookings(prev => prev.filter(b => b.id !== bookingId));
          setCancelConfirmId(null);

          // 觸發 Webhook 通知 GAS 刪除行事曆事件並寄信
          if (GAS_WEBHOOK_URL && GAS_WEBHOOK_URL.startsWith('http')) {
            fetch(GAS_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({
                action: 'cancel',
                dateRaw: bookingToCancel.dateRaw,
                time: bookingToCancel.time,
                email: bookingToCancel.email,
                phone: bookingToCancel.phone,
                name: bookingToCancel.name
              })
            }).catch(e => console.warn(e));
          }
          
          alert('預約已成功取消！此時段將重新開放預約，我們也會發送信件通知您。');
        } catch (err) {
          console.error(err);
          alert('取消失敗，請確認網路連線或是否已有刪除權限。');
        } finally {
          setIsCanceling(false);
        }
      };

      return (
        <div className="animate-fade-in-up space-y-6">
          <p className="text-gray-500 text-sm text-center mb-4 bg-teal-50 py-2 rounded-lg text-teal-700 font-medium">
            請輸入您預約時使用的 Email 與 手機號碼 來查詢或取消您的協談時間。
          </p>
          
          <form onSubmit={handleQuery} className="space-y-3">
            <input 
              type="email" required placeholder="請輸入 Email"
              value={queryEmail} onChange={e => setQueryEmail(e.target.value)}
              className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition-all bg-gray-50 focus:bg-white"
            />
            <input 
              type="tel" required placeholder="請輸入 手機號碼"
              value={queryPhone} onChange={e => setQueryPhone(e.target.value)}
              className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition-all bg-gray-50 focus:bg-white"
            />
            <button type="submit" disabled={isQuerying || !queryEmail || !queryPhone} className="w-full py-3 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 disabled:bg-gray-400 transition-colors flex items-center justify-center">
              {isQuerying ? <Clock className="animate-spin mr-2" size={20} /> : <SearchIcon className="mr-2" size={20} />} 查詢紀錄
            </button>
          </form>

          {queriedBookings !== null && (
            <div className="mt-6 space-y-4">
              <h3 className="text-lg font-bold text-gray-800 border-b pb-2">查詢結果</h3>
              {queriedBookings.length === 0 ? (
                <p className="text-gray-500 text-center py-4">目前沒有找到未來有效的預約紀錄喔！</p>
              ) : (
                queriedBookings.map(booking => (
                  <div key={booking.id} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                      <p className="text-teal-700 font-bold mb-1 flex items-center"><CalendarIcon size={16} className="mr-1" /> {booking.dateLabel} {booking.time}</p>
                      <p className="text-gray-600 text-sm flex items-center"><User size={14} className="mr-1" /> {booking.name}</p>
                    </div>
                    
                    {cancelConfirmId === booking.id ? (
                      <div className="flex items-center space-x-2 bg-red-50 p-2 rounded-lg border border-red-100">
                        <span className="text-xs text-red-600 font-bold mr-2">確定取消?</span>
                        <button onClick={() => handleCancel(booking.id)} disabled={isCanceling} className="px-3 py-1.5 bg-red-500 text-white text-sm rounded-md hover:bg-red-600 disabled:opacity-50">是</button>
                        <button onClick={() => setCancelConfirmId(null)} disabled={isCanceling} className="px-3 py-1.5 bg-gray-200 text-gray-700 text-sm rounded-md hover:bg-gray-300 disabled:opacity-50">否</button>
                      </div>
                    ) : (
                      <button onClick={() => setCancelConfirmId(booking.id)} className="text-red-500 hover:text-red-700 flex items-center justify-center sm:justify-start text-sm font-medium py-2 px-3 hover:bg-red-50 rounded-lg transition-colors">
                        <TrashIcon size={16} className="mr-1" /> 取消預約
                      </button>
                    )}
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [allBookings, setAllBookings] = useState([]);
      const [busySlots, setBusySlots] = useState([]); // 儲存外部行事曆忙碌時間
      const [currentMode, setCurrentMode] = useState('book'); // 'book' (預約) or 'query' (查詢)
      const [step, setStep] = useState(1);
      const [selectedDate, setSelectedDate] = useState(null);
      const [selectedTime, setSelectedTime] = useState(null);
      const [isLoadingSchedule, setIsLoadingSchedule] = useState(true);
      const [error, setError] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState(null);
      const [formData, setFormData] = useState({ name: '', phone: '', email: '', notes: '' });

      // 初始化 Firebase 匿名登入
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (e) {
            console.error("Auth error", e);
            if(e.code === 'auth/admin-restricted-operation' || e.code === 'auth/operation-not-allowed'){
               setError("請至 Firebase 後台開啟「匿名登入 (Anonymous Auth)」功能。");
            } else {
               setError("無法連線至資料庫，請檢查您的設定或網路。");
            }
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // 監聽 Firestore 即時預約資料
      useEffect(() => {
        if (!user) return;
        setIsLoadingSchedule(true);
        
        const bookingsRef = collection(db, 'artifacts', databaseNameId, 'public', 'data', 'bookings');
        
        const unsubscribe = onSnapshot(bookingsRef, (snapshot) => {
          const fetchedBookings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllBookings(fetchedBookings);
          setIsLoadingSchedule(false);
        }, (err) => {
          console.error("Firestore error:", err);
          setIsLoadingSchedule(false);
        });

        return () => unsubscribe();
      }, [user]);

      // 抓取外部 Google 行事曆的忙碌時間
      useEffect(() => {
        if (GAS_WEBHOOK_URL && GAS_WEBHOOK_URL.startsWith('http')) {
          // 加入 timestamp 防止瀏覽器快取舊的行事曆資料
          const timestamp = new Date().getTime();
          fetch(`${GAS_WEBHOOK_URL}?action=getBusy&t=${timestamp}`)
            .then(res => res.json())
            .then(data => {
              if (data && data.busy) {
                console.log("成功取得行事曆外部事件:", data.busy);
                setBusySlots(data.busy);
              }
            })
            .catch(err => console.warn("無法取得行事曆外部事件 (GAS尚未部署正確或無權限)", err));
        }
      }, []);

      // 產生排程模板
      const baseSchedule = useMemo(() => {
        const scheduleTemplate = {};
        const today = new Date();
        for (let i = 1; i <= 14; i++) {
          const nextDate = new Date(today);
          nextDate.setDate(today.getDate() + i);
          if (nextDate.getDay() === 0 || nextDate.getDay() === 6) continue;
          
          const dateString = nextDate.toISOString().split('T')[0];
          const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
          const formattedDate = `${nextDate.getMonth() + 1}月${nextDate.getDate()}日 (${dayNames[nextDate.getDay()]})`;
          
          scheduleTemplate[dateString] = { 
            label: formattedDate, 
            slots: ['09:00', '11:00', '14:00', '16:00', '19:00'] 
          };
        }
        return scheduleTemplate;
      }, []);

      // 過濾已被預約的時段 + 外部行事曆避讓機制 (間隔2小時)
      const schedule = useMemo(() => {
        const availableSchedule = {};
        Object.keys(baseSchedule).forEach(date => {
          const bookedSlotsForDate = allBookings
            .filter(b => b.dateRaw === date)
            .map(b => b.time);
            
          const availableSlots = baseSchedule[date].slots.filter(time => {
            // 1. 排除本系統已經被預約的時間
            if (bookedSlotsForDate.includes(time)) return false;

            // 2. 排除外部行事曆的事件 (並且與其他事件維持前後 2 小時的間隔)
            // 將網頁時段轉換為 timestamp (假設您的系統在台灣時間 UTC+8)
            const slotStart = new Date(`${date}T${time}:00+08:00`).getTime();
            const slotEnd = slotStart + 60 * 60 * 1000; // 協談長度假設為 1 小時
            const TWO_HOURS = 2 * 60 * 60 * 1000;

            const hasConflict = busySlots.some(busy => {
              const busyStart = new Date(busy.start).getTime();
              const busyEnd = new Date(busy.end).getTime();

              // 全天事件 (通常時間超過 23 小時) 會把整天都佔用
              if (busyEnd - busyStart >= 23 * 60 * 60 * 1000) {
                 // 如果這個全天事件包含我們考慮的這一天，就當作衝突
                 const busyDateStr = new Date(busyStart).toISOString().split('T')[0];
                 if (busyDateStr === date) {
                     return true; 
                 }
              }
              
              // 衝突條件判斷：新時段的結尾+2小時如果蓋過原本事件的開始，且新時段的開始小於原本事件的結尾+2小時，就代表沒有維持 2 小時間隔
              return (slotEnd + TWO_HOURS > busyStart) && (slotStart < busyEnd + TWO_HOURS);
            });

            return !hasConflict;
          });
          
          if (availableSlots.length > 0) {
            availableSchedule[date] = { ...baseSchedule[date], slots: availableSlots };
          }
        });
        return availableSchedule;
      }, [baseSchedule, allBookings, busySlots]);

      const availableDates = useMemo(() => Object.keys(schedule).sort(), [schedule]);

      const handleTimeSelect = (date, time) => {
        setSubmitError(null);
        setSelectedDate(date);
        setSelectedTime(time);
        setStep(2);
        safeScrollToTop();
      };

      const handleBackToStep1 = () => {
        setStep(1);
        safeScrollToTop();
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const resetBooking = () => {
        setStep(1);
        setSelectedDate(null);
        setSelectedTime(null);
        setFormData({ name: '', phone: '', email: '', notes: '' });
        setSubmitError(null);
        setCurrentMode('book');
        safeScrollToTop();
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSubmitError(null);
        setIsSubmitting(true);
        
        if (!user) {
          setSubmitError("系統連線中，請稍候再試。");
          setIsSubmitting(false);
          return;
        }

        const isBooked = allBookings.some(b => b.dateRaw === selectedDate && b.time === selectedTime);
        if (isBooked) {
          setSubmitError("不好意思！此時段剛剛已被其他人預約，請選擇其他時段。");
          setIsSubmitting(false);
          return;
        }

        const submitData = { 
          action: 'book',
          dateRaw: selectedDate, 
          dateLabel: schedule[selectedDate]?.label || '', 
          time: selectedTime, 
          name: formData.name, 
          phone: formData.phone,
          email: formData.email, 
          notes: formData.notes,
          userId: user.uid,
          createdAt: new Date().toISOString()
        };
        
        try {
          // 1. 將預約資料寫入 Firebase 資料庫
          const bookingsRef = collection(db, 'artifacts', databaseNameId, 'public', 'data', 'bookings');
          await addDoc(bookingsRef, submitData);
          
          // 2. 觸發 Google Apps Script 來寄信與寫入行事曆
          if (GAS_WEBHOOK_URL && GAS_WEBHOOK_URL.startsWith('http')) {
            try {
              fetch(GAS_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(submitData)
              }).catch(err => console.warn("Webhook background error:", err));
            } catch(e) { 
              console.warn("Webhook fetch failed", e); 
            }
          }

          setStep(3);
          safeScrollToTop();
        } catch (error) { 
          console.error(error);
          setSubmitError("預約失敗，請檢查網路連線。"); 
        } finally { 
          setIsSubmitting(false); 
        }
      };

      return (
        <div className="min-h-screen bg-gray-100/50 flex items-center justify-center p-4 font-sans text-gray-800 sm:p-8">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden ring-1 ring-gray-900/5">
            <div className="bg-teal-600 text-white p-6 relative overflow-hidden">
              {step === 2 && currentMode === 'book' && (
                <button type="button" onClick={handleBackToStep1} className="absolute left-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white p-2 rounded-full z-10">
                  <ChevronLeft size={24} />
                </button>
              )}
              <div className="relative z-10">
                <h1 className="text-xl font-bold text-center tracking-wide flex items-center justify-center">
                  {currentMode === 'book' ? (
                    <>
                      {step === 1 && <CalendarHeart className="mr-2" size={22} />}
                      {step === 1 ? '預約協談時間' : step === 2 ? '填寫協談資料' : '預約成功'}
                    </>
                  ) : (
                    <>
                       <SearchIcon className="mr-2" size={22} />
                       查詢與取消預約
                    </>
                  )}
                </h1>
                {currentMode === 'book' && step < 3 && <StepIndicator currentStep={step} />}
              </div>
            </div>
            
            {/* 模式切換標籤 (僅在第一步時顯示) */}
            {(step === 1 || currentMode === 'query') && (
              <div className="flex border-b border-gray-100 bg-gray-50/50">
                <button 
                  onClick={() => { setCurrentMode('book'); setStep(1); }} 
                  className={`flex-1 py-3 text-sm font-bold transition-colors ${currentMode === 'book' ? 'text-teal-600 border-b-2 border-teal-600 bg-white' : 'text-gray-400 hover:text-gray-600'}`}
                >
                  我要預約
                </button>
                <button 
                  onClick={() => setCurrentMode('query')} 
                  className={`flex-1 py-3 text-sm font-bold transition-colors ${currentMode === 'query' ? 'text-teal-600 border-b-2 border-teal-600 bg-white' : 'text-gray-400 hover:text-gray-600'}`}
                >
                  查詢 / 取消
                </button>
              </div>
            )}

            <div className="p-6 sm:p-8">
              {currentMode === 'book' ? (
                <>
                  {step === 1 && (
                    <StepOneTimeSelection schedule={schedule} availableDates={availableDates} onTimeSelect={handleTimeSelect} isLoadingSchedule={isLoadingSchedule} error={error} />
                  )}
                  {step === 2 && (
                    <StepTwoForm schedule={schedule} selectedDate={selectedDate} selectedTime={selectedTime} formData={formData} onChange={handleInputChange} onSubmit={handleSubmit} isSubmitting={isSubmitting} submitError={submitError} onBack={handleBackToStep1} />
                  )}
                  {step === 3 && (
                    <StepThreeSuccess formData={formData} schedule={schedule} selectedDate={selectedDate} selectedTime={selectedTime} onReset={resetBooking} />
                  )}
                </>
              ) : (
                <QueryBookingView allBookings={allBookings} db={db} databaseNameId={databaseNameId} />
              )}
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
