<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上諮商預約系統</title>
  
  <!-- 引入 Tailwind CSS 進行快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用來在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    .animate-fade-in-right { animation: fadeInRight 0.4s ease-out forwards; }
    .animate-scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-spin-slow { animation: spin 2s linear infinite; }
  </style>
</head>
<body>
  <!-- React 會將應用程式渲染在這個 div 中 -->
  <div id="root"></div>

  <!-- React 程式碼開始 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ==========================================
    // 0. 圖示元件 (替換掉 lucide-react，確保在單一 HTML 能正常運作)
    // ==========================================
    const Calendar = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const Clock = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const User = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const CheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const Mail = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>;
    const FileText = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>;
    const CalendarHeart = ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h7"></path><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path><path d="M21.29 14.7a2.43 2.43 0 0 0-2.65-.52c-.3.12-.57.3-.8.53l-.34.34-.35-.34a2.43 2.43 0 0 0-2.65-.53c-.3.12-.56.3-.79.53-.95.94-1 2.53-.2 3.59L17.5 22l4-3.73c.8-1.06.75-2.65-.21-3.57z"></path></svg>;

    // ==========================================
    // 1. 模擬資料生成器
    // ==========================================
    const generateMockSchedule = () => {
      const schedule = {};
      const today = new Date();
      for (let i = 1; i <= 14; i++) {
        const nextDate = new Date(today);
        nextDate.setDate(today.getDate() + i);
        if (nextDate.getDay() === 0 || nextDate.getDay() === 6) continue;
        
        const dateString = nextDate.toISOString().split('T')[0];
        const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const formattedDate = `${nextDate.getMonth() + 1}月${nextDate.getDate()}日 (${dayNames[nextDate.getDay()]})`;
        const slots = ['09:00', '11:00', '14:00', '16:00', '19:00'].filter(() => Math.random() > 0.3);
        
        if (slots.length > 0) {
          schedule[dateString] = { label: formattedDate, slots: slots };
        }
      }
      return schedule;
    };

    // ==========================================
    // 2. 共用 UI 元件
    // ==========================================
    const StepIndicator = ({ currentStep }) => (
      <div className="flex justify-center mt-4">
        <div className="flex items-center space-x-2">
          <div className={`transition-all duration-300 rounded-full ${currentStep >= 1 ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-teal-400 opacity-50'}`}></div>
          <div className={`transition-all duration-300 rounded-full ${currentStep >= 2 ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-teal-400 opacity-50'}`}></div>
          <div className={`transition-all duration-300 rounded-full ${currentStep >= 3 ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-teal-400 opacity-50'}`}></div>
        </div>
      </div>
    );

    const InputField = ({ label, icon: Icon, required, note, type = "text", ...props }) => (
      <div className="mb-4">
        <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center">
          {Icon && <Icon size={16} className="mr-1 text-teal-600" />} 
          {label} 
          {required && <span className="text-red-500 ml-1">*</span>}
          {note && <span className="text-gray-400 text-xs ml-2">{note}</span>}
        </label>
        {type === 'textarea' ? (
          <textarea
            {...props}
            className="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all resize-none bg-gray-50 focus:bg-white"
          />
        ) : (
          <input
            type={type}
            required={required}
            {...props}
            className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all bg-gray-50 focus:bg-white"
          />
        )}
      </div>
    );

    // ==========================================
    // 3. 步驟畫面元件
    // ==========================================
    const StepOneTimeSelection = ({ schedule, availableDates, onTimeSelect, isLoadingSchedule }) => (
      <div className="space-y-6 animate-fade-in-up">
        <p className="text-gray-500 text-sm text-center mb-4 bg-teal-50 py-2 rounded-lg text-teal-700">
          請選擇您方便的日期與時段 <br/><span className="text-xs opacity-80">(系統已自動避開無法預約的時間)</span>
        </p>
        
        <div className="h-[420px] overflow-y-auto pr-2 space-y-4 custom-scrollbar">
          {isLoadingSchedule ? (
            <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-3">
              <Clock className="animate-spin-slow text-teal-500" size={32} />
              <p className="text-sm font-medium">正在讀取最新可用時段...</p>
            </div>
          ) : availableDates.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-2">
              <p>近期已無可用時段，請稍後再試</p>
            </div>
          ) : (
            availableDates.map(date => (
              <div key={date} className="bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                <div className="flex items-center text-teal-700 font-semibold mb-3 border-b border-gray-50 pb-2">
                  <Calendar size={18} className="mr-2" />
                  {schedule[date].label}
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {schedule[date].slots.map(time => (
                    <button
                      key={time}
                      onClick={() => onTimeSelect(date, time)}
                      className="py-2.5 px-2 text-sm font-medium rounded-lg border border-teal-100 text-teal-700 bg-teal-50/50 hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-all focus:ring-4 focus:ring-teal-200 focus:outline-none active:scale-95"
                    >
                      {time}
                    </button>
                  ))}
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    );

    const StepTwoForm = ({ schedule, selectedDate, selectedTime, formData, onChange, onSubmit, isSubmitting }) => (
      <div className="animate-fade-in-right">
        <div className="bg-gradient-to-r from-teal-50 to-emerald-50 rounded-xl p-5 mb-6 flex items-center justify-between border border-teal-100 shadow-sm">
          <div>
            <p className="text-xs text-teal-600 font-bold mb-1 tracking-wider">已選時段</p>
            <p className="text-gray-800 font-bold text-lg">
              {schedule[selectedDate]?.label} <span className="text-teal-700 ml-2">{selectedTime}</span>
            </p>
          </div>
          <div className="bg-white p-2 rounded-full shadow-sm">
            <Clock className="text-teal-500" size={24} />
          </div>
        </div>

        <form onSubmit={onSubmit} className="space-y-2">
          <InputField 
            label="真實姓名" icon={User} required name="name" 
            value={formData.name} onChange={onChange} placeholder="請輸入您的姓名" 
          />
          <InputField 
            label="電子郵件" icon={Mail} required type="email" name="email" 
            value={formData.email} onChange={onChange} placeholder="example@email.com" 
          />
          <InputField 
            label="諮商備註" icon={FileText} type="textarea" note="(選填)" name="notes" rows="3" 
            value={formData.notes} onChange={onChange} placeholder="簡單描述您想討論的議題，或需要特別協助的地方..." 
          />

          <button
            type="submit"
            disabled={isSubmitting}
            className={`w-full py-3.5 rounded-xl font-bold text-white shadow-lg transition-all mt-8 flex justify-center items-center ${
              isSubmitting 
                ? 'bg-gray-400 cursor-not-allowed shadow-none' 
                : 'bg-teal-600 hover:bg-teal-700 hover:shadow-teal-500/30 hover:-translate-y-0.5 active:translate-y-0'
            }`}
          >
            {isSubmitting ? (
              <React.Fragment><Clock className="animate-spin mr-2" size={18} /> 處理中...</React.Fragment>
            ) : '確認送出預約'}
          </button>
        </form>
      </div>
    );

    const StepThreeSuccess = ({ formData, schedule, selectedDate, selectedTime, onReset }) => (
      <div className="text-center py-10 animate-scale-in">
        <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 relative">
          <div className="absolute inset-0 bg-green-400 rounded-full animate-ping opacity-20"></div>
          <CheckCircle className="text-green-500 relative z-10" size={48} />
        </div>
        
        <h2 className="text-2xl font-bold text-gray-800 mb-3">預約已成功送出！</h2>
        <div className="bg-gray-50 rounded-xl p-4 inline-block mb-6 border border-gray-100">
          <p className="text-gray-600">
            感謝您，<span className="font-semibold text-gray-800">{formData.name}</span>。<br/>
            您的預約時間為：<br/>
            <span className="font-bold text-lg text-teal-700 mt-2 inline-block">
              {schedule[selectedDate]?.label} {selectedTime}
            </span>
          </p>
        </div>
        
        <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 text-left mb-8 rounded-r-xl shadow-sm">
          <p className="text-sm text-yellow-800 leading-relaxed">
            我們已將預約確認信發送至您的 Email，後續將透過 Email 與您聯繫，請留意您的信箱。
          </p>
        </div>

        <button
          onClick={onReset}
          className="text-teal-600 font-semibold hover:text-teal-800 hover:bg-teal-50 px-6 py-2 rounded-lg transition-colors"
        >
          返回首頁
        </button>
      </div>
    );

    // ==========================================
    // 4. 主應用程式元件
    // ==========================================
    function App() {
      const [schedule, setSchedule] = useState({});
      const [step, setStep] = useState(1);
      const [selectedDate, setSelectedDate] = useState(null);
      const [selectedTime, setSelectedTime] = useState(null);
      
      const [isLoadingSchedule, setIsLoadingSchedule] = useState(true);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formData, setFormData] = useState({ name: '', email: '', notes: '' });

      // 👇 將您部署完成的 Google Apps Script 網頁應用程式 URL 貼在這裡 👇
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwm42tMpc_vRFVkZRE9GOBLcpktKdWVTc9gyGgu8K3gEvt3UY42UtwNu-KiJIpWiaXqvg/exec'; 

      const fetchSchedule = async () => {
        setIsLoadingSchedule(true);
        
        if (!GAS_URL || GAS_URL.trim() === '') {
          setTimeout(() => {
            setSchedule(generateMockSchedule());
            setIsLoadingSchedule(false);
          }, 800);
          return;
        }

        try {
          const response = await fetch(`${GAS_URL}?action=getSchedule`, {
            method: 'GET',
            mode: 'cors'
          });
          const data = await response.json();
          
          if (data && !data.error) {
            setSchedule(data);
          } else {
            console.warn('GAS 回傳了錯誤，將退回使用模擬資料:', data.error);
            setSchedule(generateMockSchedule()); 
          }
        } catch (error) {
          console.warn('無法連線至 Google Apps Script，正在使用模擬資料作為備用。');
          setSchedule(generateMockSchedule()); 
        } finally {
          setIsLoadingSchedule(false);
        }
      };

      useEffect(() => {
        fetchSchedule();
      }, []);

      const availableDates = useMemo(() => Object.keys(schedule).sort(), [schedule]);

      const handleTimeSelect = (date, time) => {
        setSelectedDate(date);
        setSelectedTime(time);
        setStep(2);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        
        const submitData = {
          dateRaw: selectedDate,
          dateLabel: schedule[selectedDate]?.label,
          time: selectedTime,
          name: formData.name,
          email: formData.email,
          notes: formData.notes
        };

        if (!GAS_URL || GAS_URL.trim() === '') {
          setTimeout(() => {
            setIsSubmitting(false);
            setStep(3);
          }, 1500);
          return;
        }

        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8',
            },
            body: JSON.stringify(submitData)
          });

          const result = await response.json();
          
          if (result.status === 'success') {
            setStep(3);
          } else {
            alert('伺服器發生錯誤，請稍後再試。');
          }
        } catch (error) {
          console.error('送出表單時發生錯誤:', error);
          alert('網路發生錯誤，請確認網路連線或稍後再試。');
        } finally {
          setIsSubmitting(false);
        }
      };

      const resetBooking = () => {
        setStep(1);
        setSelectedDate(null);
        setSelectedTime(null);
        setFormData({ name: '', email: '', notes: '' });
        fetchSchedule(); 
      };

      const headerTitles = { 1: '預約諮商時間', 2: '填寫預約資料', 3: '預約成功' };

      return (
        <div className="min-h-screen bg-gray-100/50 flex items-center justify-center p-4 font-sans text-gray-800 sm:p-8">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden transition-all duration-300 ring-1 ring-gray-900/5">
            <div className="bg-teal-600 text-white p-6 relative overflow-hidden">
              <div className="absolute top-[-20%] right-[-10%] w-48 h-48 bg-teal-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
              
              {step === 2 && (
                <button 
                  onClick={() => setStep(1)}
                  className="absolute left-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white p-2 rounded-full hover:bg-teal-700/50 transition-all z-10"
                  aria-label="返回上一步"
                >
                  <ChevronLeft size={24} />
                </button>
              )}
              
              <div className="relative z-10">
                <h1 className="text-xl font-bold text-center tracking-wide flex items-center justify-center">
                  {step === 1 && <CalendarHeart className="mr-2" size={22} />}
                  {headerTitles[step]}
                </h1>
                {step < 3 && <StepIndicator currentStep={step} />}
              </div>
            </div>

            <div className="p-6 sm:p-8">
              {step === 1 && (
                <StepOneTimeSelection 
                  schedule={schedule} 
                  availableDates={availableDates} 
                  onTimeSelect={handleTimeSelect}
                  isLoadingSchedule={isLoadingSchedule}
                />
              )}

              {step === 2 && (
                <StepTwoForm 
                  schedule={schedule}
                  selectedDate={selectedDate}
                  selectedTime={selectedTime}
                  formData={formData}
                  onChange={handleInputChange}
                  onSubmit={handleSubmit}
                  isSubmitting={isSubmitting}
                />
              )}

              {step === 3 && (
                <StepThreeSuccess 
                  formData={formData}
                  schedule={schedule}
                  selectedDate={selectedDate}
                  selectedTime={selectedTime}
                  onReset={resetBooking}
                />
              )}
            </div>
          </div>
        </div>
      );
    }

    // 將 App 元件渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
